<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Portal - Busiada Girls</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
        
        .phone-frame {
            width: 320px;
            height: 600px;
            background: #1a1a1a;
            border-radius: 45px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 4px solid #333;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 35px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Home Screen Background */
        .home-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
        }

        .app-icon {
            @apply flex flex-col items-center justify-center gap-1 cursor-pointer transition-transform;
        }
        .app-icon:active { transform: scale(0.9); }
        .icon-box {
            @apply w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg;
        }

        .ussd-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            z-index: 100;
            padding: 1.5rem;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 90;
        }

        .home-indicator {
            width: 100px;
            height: 4px;
            background: #000;
            border-radius: 2px;
            margin: 8px auto;
            opacity: 0.3;
            cursor: pointer;
        }
        
        .dark-indicator { background: #fff; opacity: 0.6; }

        .hidden-app { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="phone-frame">
        <div class="screen" id="phone-screen">
            
            <!-- Status Bar -->
            <div id="status-bar" class="flex justify-between items-center px-6 py-2 text-xs font-bold z-50">
                <span id="clock">9:41</span>
                <div class="flex gap-1">
                    <i data-lucide="signal" class="w-3 h-3"></i>
                    <i data-lucide="wifi" class="w-3 h-3"></i>
                    <i data-lucide="battery" class="w-3 h-3"></i>
                </div>
            </div>

            <!-- 1. HOME SCREEN VIEW -->
            <div id="view-home" class="flex-grow home-bg p-6 flex flex-col">
                <div class="grid grid-cols-3 gap-6 mt-4">
                    <div class="app-icon" onclick="openApp('phone')">
                        <div class="icon-box bg-green-500 text-white">
                            <i data-lucide="phone" class="w-8 h-8 fill-current"></i>
                        </div>
                        <span class="text-[10px] text-white font-medium">Phone</span>
                    </div>
                    <div class="app-icon" onclick="openApp('messages')">
                        <div class="icon-box bg-blue-500 text-white">
                            <i data-lucide="message-circle" class="w-8 h-8 fill-current"></i>
                        </div>
                        <span class="text-[10px] text-white font-medium">Messages</span>
                    </div>
                    <div class="app-icon" onclick="openApp('school')">
                        <div class="icon-box bg-purple-600 text-white">
                            <i data-lucide="graduation-cap" class="w-8 h-8"></i>
                        </div>
                        <span class="text-[10px] text-white font-medium">Portal</span>
                    </div>
                </div>
                
                <div class="mt-auto">
                    <div class="home-indicator dark-indicator" onclick="goHome()"></div>
                </div>
            </div>

            <!-- 2. PHONE APP VIEW -->
            <div id="view-phone" class="flex-grow flex flex-col bg-white hidden-app">
                <div class="flex-grow flex flex-col p-4">
                    <div class="flex-grow flex items-center justify-center">
                        <input type="text" id="dial-display" readonly 
                            class="text-4xl text-center w-full outline-none bg-transparent text-slate-800 font-medium" 
                            placeholder=" ">
                    </div>

                    <div class="dial-pad grid grid-cols-3 gap-4 mb-4">
                        <button onclick="press('1')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">1</button>
                        <button onclick="press('2')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">2</button>
                        <button onclick="press('3')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">3</button>
                        <button onclick="press('4')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">4</button>
                        <button onclick="press('5')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">5</button>
                        <button onclick="press('6')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">6</button>
                        <button onclick="press('7')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">7</button>
                        <button onclick="press('8')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">8</button>
                        <button onclick="press('9')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">9</button>
                        <button onclick="press('*')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">*</button>
                        <button onclick="press('0')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">0</button>
                        <button onclick="press('#')" class="h-14 w-14 mx-auto rounded-full bg-slate-100 flex items-center justify-center text-xl font-semibold">#</button>
                    </div>

                    <div class="flex justify-around items-center mb-4">
                        <div class="w-14"></div>
                        <button onclick="dial()" class="h-14 w-14 rounded-full bg-green-500 flex items-center justify-center text-white shadow-lg">
                            <i data-lucide="phone" class="fill-current"></i>
                        </button>
                        <button onclick="backspace()" class="h-14 w-14 flex items-center justify-center text-slate-400">
                            <i data-lucide="delete"></i>
                        </button>
                    </div>
                </div>
                <div class="home-indicator" onclick="goHome()"></div>
            </div>

            <!-- 3. MESSAGES APP VIEW -->
            <div id="view-messages" class="flex-grow flex flex-col bg-white hidden-app">
                <div class="p-4 border-b flex justify-between items-center">
                    <h1 class="text-xl font-bold">Messages</h1>
                    <i data-lucide="edit" class="w-5 h-5 text-blue-500"></i>
                </div>
                <div class="flex-grow overflow-y-auto p-4 space-y-4">
                    <div class="flex gap-3 items-center p-2 border-b">
                        <div class="w-10 h-10 bg-slate-200 rounded-full flex items-center justify-center">
                            <i data-lucide="user" class="w-6 h-6 text-slate-500"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between">
                                <span class="font-bold text-sm">Service Provider</span>
                                <span class="text-[10px] text-slate-400">Just now</span>
                            </div>
                            <p class="text-xs text-slate-500 truncate">Welcome to your new mobile portal...</p>
                        </div>
                    </div>
                </div>
                <div class="home-indicator" onclick="goHome()"></div>
            </div>

            <!-- USSD System Overlay (Global) -->
            <div id="ussd-overlay" class="overlay hidden"></div>
            <div id="ussd-container" class="ussd-modal hidden">
                <p id="ussd-text" class="text-sm text-gray-700 mb-4 whitespace-pre-wrap font-medium leading-relaxed"></p>
                <input type="text" id="ussd-input" class="w-full border-b-2 border-green-500 outline-none mb-4 py-1 text-sm">
                <div class="flex justify-end gap-6 text-green-600 font-bold text-sm tracking-wider">
                    <button onclick="cancelUSSD()">CANCEL</button>
                    <button onclick="handleUSSDAction()">SEND</button>
                </div>
            </div>

            <!-- Loader -->
            <div id="ussd-loader" class="ussd-modal hidden text-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-500 mx-auto mb-2"></div>
                <p class="text-xs text-gray-500">Processing...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let dialString = "";
        let ussdState = "IDLE";
        let studentData = { name: "", admission: "" };

        // Navigation Elements
        const views = {
            home: document.getElementById('view-home'),
            phone: document.getElementById('view-phone'),
            messages: document.getElementById('view-messages')
        };
        const statusBar = document.getElementById('status-bar');

        // USSD Elements
        const dialDisplay = document.getElementById('dial-display');
        const ussdContainer = document.getElementById('ussd-container');
        const ussdOverlay = document.getElementById('ussd-overlay');
        const ussdText = document.getElementById('ussd-text');
        const ussdInput = document.getElementById('ussd-input');
        const ussdLoader = document.getElementById('ussd-loader');

        // Init Auth
        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        }
        onAuthStateChanged(auth, user => currentUser = user);
        init();

        // UI Helpers
        window.openApp = (appId) => {
            Object.values(views).forEach(v => v.classList.add('hidden-app'));
            if (appId === 'phone') {
                views.phone.classList.remove('hidden-app');
                statusBar.classList.remove('text-white');
                statusBar.classList.add('text-black');
            } else if (appId === 'messages') {
                views.messages.classList.remove('hidden-app');
                statusBar.classList.remove('text-white');
                statusBar.classList.add('text-black');
            } else if (appId === 'school') {
                // Shortcut to dial
                views.phone.classList.remove('hidden-app');
                dialString = "*254#";
                dialDisplay.value = dialString;
                dial();
            }
        };

        window.goHome = () => {
            Object.values(views).forEach(v => v.classList.add('hidden-app'));
            views.home.classList.remove('hidden-app');
            statusBar.classList.add('text-white');
            statusBar.classList.remove('text-black');
            cancelUSSD();
        };

        // Dialing Logic
        window.press = (k) => { dialString += k; dialDisplay.value = dialString; };
        window.backspace = () => { dialString = dialString.slice(0, -1); dialDisplay.value = dialString; };
        window.dial = () => {
            if (dialString === "*254#") showMenu();
            else if (dialString) showUSSD("Invalid MMI code.", false);
        };

        function showUSSD(text, input = true) {
            ussdText.innerText = text;
            ussdInput.style.display = input ? "block" : "none";
            ussdOverlay.classList.remove('hidden');
            ussdContainer.classList.remove('hidden');
            if (input) { ussdInput.value = ""; ussdInput.focus(); }
        }

        window.cancelUSSD = () => {
            ussdOverlay.classList.add('hidden');
            ussdContainer.classList.add('hidden');
            ussdLoader.classList.add('hidden');
            ussdState = "IDLE";
            dialString = "";
            dialDisplay.value = "";
        };

        // USSD States
        function showMenu(err = "") {
            ussdState = "MENU";
            showUSSD(`${err ? err + "\n\n" : ""}Welcome to Busiada Girls\n1. Register Student\n2. Search Record\n3. About School\n4. Delete Record\n\n0. Exit`, true);
        }

        window.handleUSSDAction = async () => {
            const val = ussdInput.value.trim();
            if (val === "0") { ussdState === "MENU" ? cancelUSSD() : showMenu(); return; }

            switch (ussdState) {
                case "MENU":
                    if (val === "1") { ussdState = "REG_NAME"; showUSSD("Enter Student Name:\n\n0. Back"); }
                    else if (val === "2") { ussdState = "SEARCH_QUERY"; showUSSD("Enter Admission No:\n\n0. Back"); }
                    else if (val === "3") { ussdState = "INFO"; showUSSD("Busiada Girls\nP.O. Box 35, Bumala.\n\n0. Back"); }
                    else if (val === "4") { ussdState = "DEL_QUERY"; showUSSD("Enter Admission to DELETE:\n\n0. Back"); }
                    else showMenu("Invalid choice.");
                    break;
                case "REG_NAME":
                    studentData.name = val; ussdState = "REG_ADM";
                    showUSSD(`Name: ${val}\nEnter Admission No:\n\n0. Back`);
                    break;
                case "REG_ADM":
                    studentData.admission = val; saveRecord();
                    break;
                case "SEARCH_QUERY": searchRecord(val); break;
                case "DEL_QUERY": deleteRecord(val); break;
                case "RESULT": showMenu(); break;
            }
        };

        async function saveRecord() {
            if (!currentUser) return;
            toggleLoader(true);
            try {
                const col = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                await addDoc(col, { ...studentData, timestamp: serverTimestamp() });
                ussdState = "RESULT";
                showUSSD(`Success!\nRegistered ${studentData.name}\n\n0. Back`);
            } catch (e) { showUSSD("Error saving."); }
            toggleLoader(false);
        }

        async function searchRecord(adm) {
            toggleLoader(true);
            try {
                const col = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                const snap = await getDocs(col);
                const s = snap.docs.find(d => d.data().admission === adm);
                ussdState = "RESULT";
                showUSSD(s ? `Found: ${s.data().name}\nAdm: ${adm}\n\n0. Back` : `No record for ${adm}\n\n0. Back`);
            } catch (e) { showUSSD("Error."); }
            toggleLoader(false);
        }

        async function deleteRecord(adm) {
            toggleLoader(true);
            try {
                const col = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                const snap = await getDocs(col);
                const docs = snap.docs.filter(d => d.data().admission === adm);
                for (const d of docs) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', d.id));
                ussdState = "RESULT";
                showUSSD(`Deleted records for ${adm}\n\n0. Back`);
            } catch (e) { showUSSD("Error."); }
            toggleLoader(false);
        }

        function toggleLoader(s) {
            ussdContainer.classList.toggle('hidden', s);
            ussdLoader.classList.toggle('hidden', !s);
        }

        // Clock
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0');
        }, 1000);

        lucide.createIcons();
        statusBar.classList.add('text-white'); // Initial state
    </script>
</body>
</html>
