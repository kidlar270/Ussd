<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Surveillance Monitor</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Firebase Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, onSnapshot, setDoc };
    </script>

    <style>
        body { background: #070709; color: #e2e8f0; font-family: sans-serif; overflow: hidden; }
        .nexus-grid { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 24px 24px; }
        .glass-panel { background: rgba(15, 15, 18, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; }
        .scan-overlay::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="module">
    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, onSnapshot, setDoc } = window.firebaseModules;

    // Firebase Config from your project
    const firebaseConfig = {
        apiKey: "AIzaSyCvaPpq5SnJlZTDPxeuy-rc6n0g-YcfxRk",
        authDomain: "ussd254-c05af.firebaseapp.com",
        projectId: "ussd254-c05af",
        storageBucket: "ussd254-c05af.firebasestorage.app",
        messagingSenderId: "807141930648",
        appId: "1:807141930648:web:8861a029a71a2b7da502ed",
        measurementId: "G-G3XT60YGC5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "nexus-surveillance-v2";

    const { useState, useEffect, useMemo } = React;

    function App() {
        const [user, setUser] = useState(null);
        const [devices, setDevices] = useState({});
        const [selectedId, setSelectedId] = useState(null);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [form, setForm] = useState({ name: '', addr: '' });
        const [quickAddr, setQuickAddr] = useState("");

        // Auth Logic (Rule 3)
        useEffect(() => {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
        }, []);

        // Real-time Firestore Listeners (Rule 1 & 2)
        useEffect(() => {
            if (!user) return;
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'devices');
            const unsubscribe = onSnapshot(ref, (snap) => {
                let d = {};
                snap.forEach(doc => d[doc.id] = doc.data());
                setDevices(d);
            }, (err) => console.error("Firestore error:", err));
            return () => unsubscribe();
        }, [user]);

        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [devices, selectedId]);

        const addDevice = async (id, name = "UNNAMED NODE") => {
            if (!id || !user) return;
            const deviceId = id.toUpperCase().trim();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'devices', deviceId), {
                name: name,
                cpu: 0,
                ram: 0,
                lastSeen: new Date().toISOString(),
                screenBuffer: ""
            }, { merge: true });
            setQuickAddr("");
            setForm({ name: '', addr: '' });
            setIsModalOpen(false);
        };

        const downloadAgent = () => {
            if (!selectedId || !user) return;
            const projectId = firebaseConfig.projectId;
            const dbPath = `projects/${projectId}/databases/(default)/documents/artifacts/${appId}/public/data/devices/${selectedId}`;
            const restUrl = `https://firestore.googleapis.com/v1/${dbPath}?updateMask.fieldPaths=cpu&updateMask.fieldPaths=ram&updateMask.fieldPaths=lastSeen&updateMask.fieldPaths=screenBuffer`;

            const script = `import time, psutil, requests, base64, io\nfrom PIL import ImageGrab\nfrom datetime import datetime\n\nNODE = "${selectedId}"\nURL = "${restUrl}"\n\ndef get_screen():\n    try:\n        img = ImageGrab.grab()\n        img.thumbnail((800, 450))\n        buf = io.BytesIO()\n        img.save(buf, format="JPEG", quality=25)\n        return "data:image/jpeg;base64," + base64.b64encode(buf.getvalue()).decode()\n    except: return ""\n\nwhile True:\n    try:\n        payload = {"fields": {\n            "cpu": {"integerValue": int(psutil.cpu_percent())},\n            "ram": {"integerValue": int(psutil.virtual_memory().percent)},\n            "lastSeen": {"timestampValue": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')},\n            "screenBuffer": {"stringValue": get_screen()}\n        }}\n        requests.patch(URL, json=payload, timeout=5)\n        time.sleep(5)\n    except: time.sleep(15)`;

            const blob = new Blob([script], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nexus-agent-${selectedId}.pyw`;
            a.click();
        };

        const selectedDevice = devices[selectedId];
        const isOnline = useMemo(() => {
            if (!selectedDevice?.lastSeen) return false;
            const lastVal = selectedDevice.lastSeen;
            const ts = lastVal?.seconds ? lastVal.seconds * 1000 : new Date(lastVal).getTime();
            return (Date.now() - ts) < 35000;
        }, [selectedDevice]);

        return React.createElement("div", { className: "h-screen w-full flex flex-col md:flex-row" },
            // Sidebar Navigation
            React.createElement("nav", { className: "w-full h-16 md:h-full md:w-20 glass-panel flex md:flex-col items-center justify-around md:justify-start py-0 md:py-8 gap-0 md:gap-8 z-50 order-last md:order-first" },
                React.createElement("div", { className: "hidden md:flex w-12 h-12 bg-blue-600 rounded-2xl items-center justify-center shadow-lg" },
                    React.createElement("i", { "data-lucide": "eye", className: "text-white w-6 h-6" })
                ),
                React.createElement("button", { className: "text-blue-400 p-3" }, React.createElement("i", { "data-lucide": "layout-grid" })),
                React.createElement("button", { onClick: () => setIsModalOpen(true), className: "text-slate-500 hover:text-white p-3" }, React.createElement("i", { "data-lucide": "plus-circle" }))
            ),

            // Devices List
            React.createElement("aside", { className: "w-full md:w-80 border-r border-white/5 bg-[#070709] nexus-grid flex flex-col shrink-0" },
                React.createElement("div", { className: "p-8" },
                    React.createElement("h2", { className: "text-[10px] font-black text-blue-500 tracking-widest uppercase mb-4" }, "Infrastructure"),
                    React.createElement("div", { className: "p-1 bg-white/5 border border-white/10 rounded-2xl flex gap-1" },
                        React.createElement("input", {
                            placeholder: "HW-ID",
                            className: "flex-1 bg-black/40 border-none rounded-xl px-4 py-2 text-xs font-mono uppercase focus:ring-0 outline-none text-white",
                            value: quickAddr,
                            onChange: e => setQuickAddr(e.target.value)
                        }),
                        React.createElement("button", { 
                            onClick: () => addDevice(quickAddr),
                            className: "px-3 bg-blue-600 text-white rounded-xl" 
                        }, React.createElement("i", { "data-lucide": "plus", className: "w-4 h-4" }))
                    )
                ),
                React.createElement("div", { className: "flex-1 overflow-y-auto px-6 space-y-2 custom-scrollbar" },
                    Object.entries(devices).map(([id, data]) => {
                        const deviceOnline = data.lastSeen ? (Date.now() - (data.lastSeen?.seconds ? data.lastSeen.seconds * 1000 : new Date(data.lastSeen).getTime())) < 35000 : false;
                        return React.createElement("div", {
                            key: id,
                            onClick: () => setSelectedId(id),
                            className: `p-4 rounded-xl border cursor-pointer transition-all ${selectedId === id ? 'bg-blue-600/10 border-blue-500/40' : 'bg-white/5 border-transparent'}`
                        },
                            React.createElement("div", { className: "flex justify-between items-center" },
                                React.createElement("div", null,
                                    React.createElement("div", { className: "text-xs font-bold text-white uppercase" }, data.name),
                                    React.createElement("div", { className: "text-[9px] font-mono text-slate-500" }, id)
                                ),
                                React.createElement("div", { className: `w-2 h-2 rounded-full ${deviceOnline ? 'bg-emerald-500 animate-pulse' : 'bg-slate-700'}` })
                            )
                        );
                    })
                )
            ),

            // Monitoring Viewport
            React.createElement("main", { className: "flex-1 flex flex-col bg-[#020203] relative overflow-hidden" },
                !selectedId ? React.createElement("div", { className: "flex-1 flex items-center justify-center text-slate-700 text-[10px] font-black uppercase tracking-widest" }, "Select Node to Monitor") :
                React.createElement(React.Fragment, null,
                    React.createElement("header", { className: "h-20 px-10 flex items-center justify-between glass-panel z-20" },
                        React.createElement("div", null,
                            React.createElement("div", { className: "text-white font-black uppercase" }, selectedDevice.name),
                            React.createElement("div", { className: `text-[10px] font-black uppercase ${isOnline ? 'text-emerald-500' : 'text-amber-500'}` }, isOnline ? 'Streaming Live' : 'Signal Lost')
                        ),
                        React.createElement("button", { onClick: downloadAgent, className: "bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black text-white uppercase" }, "Deploy Agent")
                    ),
                    React.createElement("div", { className: "flex-1 p-10 space-y-6 overflow-y-auto custom-scrollbar" },
                        React.createElement("div", { className: "grid grid-cols-2 gap-4" },
                            React.createElement("div", { className: "glass-panel p-6 rounded-3xl" },
                                React.createElement("div", { className: "text-[10px] font-bold text-slate-500 uppercase mb-2" }, "CPU Load"),
                                React.createElement("div", { className: "text-3xl font-mono font-black" }, selectedDevice.cpu || 0, "%")
                            ),
                            React.createElement("div", { className: "glass-panel p-6 rounded-3xl" },
                                React.createElement("div", { className: "text-[10px] font-bold text-slate-500 uppercase mb-2" }, "RAM Utilization"),
                                React.createElement("div", { className: "text-3xl font-mono font-black" }, selectedDevice.ram || 0, "%")
                            )
                        ),
                        React.createElement("div", { className: "aspect-video bg-black rounded-[2rem] border border-white/5 overflow-hidden relative scan-overlay flex items-center justify-center shadow-2xl" },
                            isOnline && selectedDevice.screenBuffer ? 
                            React.createElement("img", { src: selectedDevice.screenBuffer, className: "w-full h-full object-contain" }) :
                            React.createElement("div", { className: "text-center opacity-20" },
                                React.createElement("i", { "data-lucide": "wifi-off", className: "w-12 h-12 mx-auto mb-2" }),
                                React.createElement("div", { className: "text-[10px] font-black uppercase" }, "No Video Feed")
                            )
                        )
                    )
                )
            ),

            // Modal
            isModalOpen && React.createElement("div", { className: "fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] flex items-center justify-center" },
                React.createElement("div", { className: "bg-[#0f0f12] p-10 rounded-[2.5rem] border border-white/10 w-full max-w-md" },
                    React.createElement("h3", { className: "text-xl font-black text-white uppercase mb-6" }, "Register New Node"),
                    React.createElement("div", { className: "space-y-4" },
                        React.createElement("input", { 
                            placeholder: "NAME (e.g. LAPTOP-01)", 
                            value: form.name,
                            onChange: e => setForm({...form, name: e.target.value}),
                            className: "w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white outline-none"
                        }),
                        React.createElement("input", { 
                            placeholder: "HW-ID", 
                            value: form.addr,
                            onChange: e => setForm({...form, addr: e.target.value}),
                            className: "w-full bg-black border border-white/10 rounded-xl p-4 text-blue-500 font-mono"
                        }),
                        React.createElement("button", { 
                            onClick: () => addDevice(form.addr, form.name),
                            className: "w-full bg-blue-600 py-4 rounded-xl font-black text-white uppercase"
                        }, "Initialize")
                    )
                )
            )
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
