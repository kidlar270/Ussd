<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Surveillance Monitor</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#070709">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Inline Web Manifest for "Add to Home Screen" -->
    <link rel="manifest" href='data:application/json,{"name":"Nexus Surveillance","short_name":"Nexus","start_url":".","display":"standalone","background_color":"#070709","theme_color":"#070709","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2533/2533503.png","sizes":"512x512","type":"image/png"}]}'>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        body { background: #070709; color: #e2e8f0; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        .nexus-grid { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 24px 24px; }
        .glass-panel { background: rgba(15, 15, 18, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; }
        .scan-overlay::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
        .main-container { height: 100vh; height: -webkit-fill-available; }
        
        .video-container:fullscreen {
            background: black;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .video-container:fullscreen img { max-height: 100vh; width: auto; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Register a dummy Service Worker to enable PWA installation
    if ('serviceWorker' in navigator) {
        const sw = 'self.addEventListener("fetch", (event) => { event.respondWith(fetch(event.request)); });';
        const blob = new Blob([sw], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        navigator.serviceWorker.register(url);
    }

    const fallbackFirebaseConfig = {
        apiKey: "AIzaSyCvaPpq5SnJlZTDPxeuy-rc6n0g-YcfxRk",
        authDomain: "ussd254-c05af.firebaseapp.com",
        projectId: "ussd254-c05af",
        storageBucket: "ussd254-c05af.firebasestorage.app",
        messagingSenderId: "807141930648",
        appId: "1:807141930648:web:8861a029a71a2b7da502ed",
        measurementId: "G-G3XT60YGC5"
    };
    const parseConfig = () => {
        if (typeof __firebase_config === "undefined" || !__firebase_config) return fallbackFirebaseConfig;
        try {
            return typeof __firebase_config === "string" ? JSON.parse(__firebase_config) : __firebase_config;
        } catch {
            return fallbackFirebaseConfig;
        }
    };
    const firebaseConfig = parseConfig();
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'nexus-surveillance-v2';

    const { useState, useEffect, useMemo, useRef } = React;

    function App() {
        const [user, setUser] = useState(null);
        const [devices, setDevices] = useState({});
        const [selectedId, setSelectedId] = useState(null);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [form, setForm] = useState({ name: '', addr: '' });
        const [quickAddr, setQuickAddr] = useState("");
        const [isBroadcasting, setIsBroadcasting] = useState(false);
        const broadcastInterval = useRef(null);
        const activeStream = useRef(null);
        const videoRef = useRef(null);

        useEffect(() => {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
        }, []);

        useEffect(() => {
            if (!user) return;
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'devices');
            const unsubscribe = onSnapshot(ref, (snap) => {
                let d = {};
                snap.forEach(doc => d[doc.id] = doc.data());
                setDevices(d);
            }, (err) => console.error("Firestore error:", err));
            return () => unsubscribe();
        }, [user]);

        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [devices, selectedId, isBroadcasting]);

        const addDevice = async (id, name = "UNNAMED NODE") => {
            if (!id || !user) return;
            const deviceId = id.toUpperCase().trim();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'devices', deviceId), {
                name: name,
                cpu: 0, ram: 0,
                lastSeen: new Date().toISOString(),
                screenBuffer: ""
            }, { merge: true });
            setQuickAddr("");
            setForm({ name: '', addr: '' });
            setIsModalOpen(false);
            setSelectedId(deviceId);
        };

        const removeDevice = async (e, id) => {
            e.stopPropagation();
            if (!user || !id) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'devices', id));
            if (selectedId === id) setSelectedId(null);
        };

        const handleFullscreen = () => {
            const el = videoRef.current;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        };

        const toggleBroadcast = async () => {
            if (isBroadcasting) {
                if (broadcastInterval.current) clearInterval(broadcastInterval.current);
                if (activeStream.current) activeStream.current.getTracks().forEach(track => track.stop());
                setIsBroadcasting(false);
                return;
            }

            try {
                let stream;
                // Desktop Screen Capture
                if (navigator.mediaDevices.getDisplayMedia) {
                    try { stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 15, width: 1280 } }); } 
                    catch (e) { console.log("Screen capture rejected"); }
                }

                // Mobile/Desktop Camera Fallback
                if (!stream) {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user", width: { ideal: 1280 } } 
                    });
                }

                activeStream.current = stream;
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.playsInline = true;
                await video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                setIsBroadcasting(true);

                broadcastInterval.current = setInterval(async () => {
                    if (!selectedId || !user) return;
                    const targetWidth = 1280; 
                    const ratio = video.videoHeight / video.videoWidth;
                    canvas.width = targetWidth;
                    canvas.height = targetWidth * ratio;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // High-quality JPEG for clarity
                    const base64 = canvas.toDataURL('image/jpeg', 0.85);
                    
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'devices', selectedId), {
                        screenBuffer: base64,
                        lastSeen: new Date().toISOString(),
                        cpu: Math.floor(Math.random() * 20),
                        ram: Math.floor(Math.random() * 30) + 10
                    });
                }, 2500); // 2.5s interval for better smoothness

                stream.getTracks()[0].onended = () => {
                    if (broadcastInterval.current) clearInterval(broadcastInterval.current);
                    setIsBroadcasting(false);
                };

            } catch (err) {
                console.error("Broadcast failed:", err);
                setIsBroadcasting(false);
            }
        };

        const selectedDevice = devices[selectedId];
        const isOnline = useMemo(() => {
            if (!selectedDevice?.lastSeen) return false;
            const ts = new Date(selectedDevice.lastSeen).getTime();
            return (Date.now() - ts) < 40000;
        }, [selectedDevice]);

        return React.createElement("div", { className: "main-container w-full flex flex-col md:flex-row" },
            // Left Nav
            React.createElement("nav", { className: "w-full h-16 md:h-full md:w-20 glass-panel flex md:flex-col items-center justify-around md:justify-start py-0 md:py-8 z-50 order-last md:order-first shrink-0" },
                React.createElement("div", { className: "hidden md:flex w-12 h-12 bg-blue-600 rounded-2xl items-center justify-center shadow-lg mb-4" },
                    React.createElement("i", { "data-lucide": "eye", className: "text-white w-6 h-6" })
                ),
                React.createElement("button", { onClick: () => setSelectedId(null), className: `p-3 ${!selectedId ? 'text-blue-400' : 'text-slate-500'}` }, React.createElement("i", { "data-lucide": "layout-grid" })),
                React.createElement("button", { onClick: () => setIsModalOpen(true), className: "text-slate-500 hover:text-white p-3" }, React.createElement("i", { "data-lucide": "plus-circle" }))
            ),

            // Sidebar List
            React.createElement("aside", { className: `w-full md:w-80 border-r border-white/5 bg-[#070709] nexus-grid flex flex-col shrink-0 ${selectedId ? 'hidden md:flex' : 'flex'}` },
                React.createElement("div", { className: "p-6 md:p-8" },
                    React.createElement("h2", { className: "text-[10px] font-black text-blue-500 tracking-widest uppercase mb-4" }, "Nexus Registry"),
                    React.createElement("div", { className: "p-1 bg-white/5 border border-white/10 rounded-2xl flex gap-1" },
                        React.createElement("input", {
                            placeholder: "ID (e.g. MOBILE-1)",
                            className: "flex-1 bg-black/40 border-none rounded-xl px-4 py-2 text-xs font-mono uppercase outline-none text-white",
                            value: quickAddr,
                            onChange: e => setQuickAddr(e.target.value)
                        }),
                        React.createElement("button", { onClick: () => addDevice(quickAddr), className: "px-3 bg-blue-600 text-white rounded-xl" }, React.createElement("i", { "data-lucide": "plus", className: "w-4 h-4" }))
                    )
                ),
                React.createElement("div", { className: "flex-1 overflow-y-auto px-6 pb-24 space-y-2 custom-scrollbar" },
                    Object.entries(devices).map(([id, data]) => {
                        const deviceOnline = (Date.now() - new Date(data.lastSeen).getTime()) < 40000;
                        return React.createElement("div", {
                            key: id,
                            onClick: () => setSelectedId(id),
                            className: `p-4 rounded-xl border transition-all cursor-pointer ${selectedId === id ? 'bg-blue-600/10 border-blue-500/40' : 'bg-white/5 border-transparent'}`
                        },
                            React.createElement("div", { className: "flex justify-between items-center" },
                                React.createElement("div", null,
                                    React.createElement("div", { className: "text-xs font-bold text-white uppercase" }, data.name),
                                    React.createElement("div", { className: "text-[9px] font-mono text-slate-500" }, id)
                                ),
                                React.createElement("div", { className: `w-2 h-2 rounded-full ${deviceOnline ? 'bg-emerald-500 animate-pulse' : 'bg-slate-700'}` })
                            )
                        );
                    })
                )
            ),

            // Main Display
            React.createElement("main", { className: `flex-1 flex flex-col bg-[#020203] relative overflow-hidden ${!selectedId ? 'hidden md:flex' : 'flex'}` },
                !selectedId ? React.createElement("div", { className: "flex-1 flex flex-col items-center justify-center text-slate-700 p-10 text-center" },
                    React.createElement("i", { "data-lucide": "radio", className: "w-12 h-12 mb-4 opacity-10" }),
                    React.createElement("div", { className: "text-[10px] font-black uppercase tracking-widest opacity-30" }, "Operational HQ - Select Uplink")
                ) :
                React.createElement(React.Fragment, null,
                    React.createElement("header", { className: "h-20 px-6 md:px-10 flex items-center justify-between glass-panel z-20" },
                        React.createElement("div", { className: "flex items-center gap-4" },
                            React.createElement("button", { onClick: () => setSelectedId(null), className: "md:hidden text-white" }, React.createElement("i", { "data-lucide": "arrow-left" })),
                            React.createElement("div", null,
                                React.createElement("div", { className: "text-white text-sm font-black uppercase" }, selectedDevice.name),
                                React.createElement("div", { className: `text-[10px] font-black uppercase ${isOnline ? 'text-emerald-500' : 'text-amber-500'}` }, isOnline ? 'Connected' : 'Offline')
                            )
                        ),
                        React.createElement("button", { 
                            onClick: toggleBroadcast,
                            className: `px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 border transition-all ${isBroadcasting ? 'bg-red-500/10 border-red-500 text-red-500' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-500'}`
                        }, 
                            React.createElement("i", { "data-lucide": "radio", className: isBroadcasting ? "animate-pulse" : "" }),
                            isBroadcasting ? "Stop" : "Broadcast"
                        )
                    ),

                    React.createElement("div", { className: "flex-1 p-4 md:p-8 space-y-4 overflow-y-auto" },
                        React.createElement("div", { className: "grid grid-cols-2 gap-4" },
                            ["CPU", "RAM"].map((label, i) => React.createElement("div", { key: label, className: "glass-panel p-4 rounded-2xl" },
                                React.createElement("div", { className: "text-[9px] font-bold text-slate-500 uppercase mb-1" }, label),
                                React.createElement("div", { className: "text-xl font-mono font-black" }, i === 0 ? selectedDevice.cpu : selectedDevice.ram, "%")
                            ))
                        ),

                        React.createElement("div", { ref: videoRef, className: "video-container relative aspect-video bg-black rounded-3xl border border-white/5 overflow-hidden scan-overlay flex items-center justify-center group" },
                            isOnline && selectedDevice.screenBuffer ? 
                            React.createElement(React.Fragment, null,
                                React.createElement("img", { src: selectedDevice.screenBuffer, className: "w-full h-full object-contain" }),
                                React.createElement("button", { 
                                    onClick: handleFullscreen,
                                    className: "absolute bottom-4 right-4 bg-black/60 p-3 rounded-xl border border-white/10 text-white opacity-0 group-hover:opacity-100 transition-opacity"
                                }, React.createElement("i", { "data-lucide": "maximize", className: "w-4 h-4" }))
                            ) :
                            React.createElement("div", { className: "text-center opacity-30" },
                                React.createElement("i", { "data-lucide": "loader", className: "w-8 h-8 mx-auto mb-2 animate-spin" }),
                                React.createElement("div", { className: "text-[9px] font-black uppercase" }, "Awaiting Signal...")
                            )
                        )
                    )
                )
            ),

            // Registration Modal
            isModalOpen && React.createElement("div", { className: "fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-6" },
                React.createElement("div", { className: "bg-[#0f0f12] p-8 rounded-[2rem] border border-white/10 w-full max-w-md" },
                    React.createElement("h3", { className: "text-lg font-black text-white uppercase mb-6" }, "New Node Registration"),
                    React.createElement("div", { className: "space-y-4" },
                        React.createElement("input", { 
                            placeholder: "DEVICE NAME", 
                            value: form.name,
                            onChange: e => setForm({...form, name: e.target.value}),
                            className: "w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white uppercase font-bold"
                        }),
                        React.createElement("input", { 
                            placeholder: "UNIQUE ID", 
                            value: form.addr,
                            onChange: e => setForm({...form, addr: e.target.value}),
                            className: "w-full bg-black border border-white/10 rounded-xl p-4 text-blue-500 font-mono uppercase"
                        }),
                        React.createElement("div", { className: "flex gap-2" },
                            React.createElement("button", { onClick: () => setIsModalOpen(false), className: "flex-1 py-4 text-slate-500 uppercase text-[10px] font-black" }, "Cancel"),
                            React.createElement("button", { onClick: () => addDevice(form.addr, form.name), className: "flex-1 bg-blue-600 py-4 rounded-xl text-white uppercase text-[10px] font-black" }, "Register")
                        )
                    )
                )
            )
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
